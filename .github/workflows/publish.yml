name: Publish to ClawHub

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ClawHub CLI
        run: npm install -g clawhub

      - name: Publish to ClawHub
        env:
          CLAWHUB_AUTH: ${{ secrets.CLAWHUB_AUTH }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          clawhub login --token "$CLAWHUB_AUTH" --no-browser
          clawhub publish . \
            --slug lemonade-server-manager \
            --name "Lemonade Server Manager" \
            --version "$VERSION" \
            --changelog "Release $GITHUB_REF_NAME"
